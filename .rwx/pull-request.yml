on:
  github:
    pull_request:
      init:
        commit-sha: ${{ event.git.sha }}
        ref: ${{ event.git.ref }}
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
      ref: ${{ event.git.sha }}

concurrency-pools:
  - id: rwx-cloud/rwx:pull-request-${{ init.ref }}
    capacity: 1
    on-overflow: cancel-running

tasks:
  - key: ci
    call: ${{ run.dir }}/ci.yml
    init:
      commit-sha: ${{ init.commit-sha }}
      ref: ${{ init.ref }}

  - key: integration
    call: ${{ run.dir }}/integration.yml
    init:
      commit-sha: ${{ init.commit-sha }}
      ref: ${{ init.ref }}
