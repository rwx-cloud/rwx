on:
  cli:
    init:
      cli: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.1

tasks:
  - key: rwx-testing-code
    call: git/clone 2.0.8
    with:
      repository: https://github.com/rwx-cloud/rwx-testing.git
      ref: main
      github-token: ${{ github['rwx-cloud'].token }}

  - key: run-def
    use: rwx-testing-code
    run: cp .rwx/trigger-integration-test.yml $RWX_ARTIFACTS/run-def

  - key: integration-tests
    call: ${{ tasks.run-def.artifacts.run-def }}
    init:
      grep: "@cli"
      ref: main
      lsp: main
      cli: ${{ init.cli }}

  - key: rwx-cli-code
    call: git/clone 2.0.8
    with:
      repository: https://github.com/rwx-cloud/rwx.git
      ref: ${{ init.cli }}

  - key: build-def
    use: rwx-cli-code
    run: cp .rwx/build.yml $RWX_ARTIFACTS/build-yml

  - key: build-rwx-cli
    call: ${{ tasks.build-def.artifacts.build-yml }}
    init:
      ref: ${{ init.cli }}

  - key: rwx-cli
    run: sudo install "$CLI_BINARY" /usr/local/bin
    env:
      CLI_BINARY: ${{ tasks.build-rwx-cli.tasks.build.artifacts.rwx }}

  - key: test-run-no-cache
    use: rwx-cli
    run: |
      set -euo pipefail

      kickoff=$(rwx run "$RUN_DEF" --wait --json --no-cache)
      status=$(echo "$kickoff" | jq -r '.ResultStatus')
      run_url=$(echo "$kickoff" | jq -r '.RunURL // empty')
      echo "$run_url" > "$RWX_LINKS/No cache run"

      if [ "$status" != "succeeded" ]; then
        echo "Expected 'succeeded' with --no-cache, got '$status'"
        echo "$kickoff"
        exit 1
      fi
    env:
      RUN_DEF: ${{ run.dir }}/integration/run-test/simple-def.yml
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}

  - key: test-run-target
    use: rwx-cli
    run: |
      set -euo pipefail

      kickoff=$(rwx run "$RUN_DEF" --wait --json --target task-a)
      status=$(echo "$kickoff" | jq -r '.ResultStatus')
      targeted=$(echo "$kickoff" | jq -r '.TargetedTaskKeys[]')
      run_url=$(echo "$kickoff" | jq -r '.RunURL // empty')
      echo "$run_url" > "$RWX_LINKS/Targeted run"

      if [ "$status" != "succeeded" ]; then
        echo "Expected 'succeeded' with --target, got '$status'"
        echo "$kickoff"
        exit 1
      fi

      if [ "$targeted" != "task-a" ]; then
        echo "Expected TargetedTaskKeys to contain 'task-a', got '$targeted'"
        echo "$kickoff"
        exit 1
      fi
    env:
      RUN_DEF: ${{ run.dir }}/integration/run-test/multi-task-def.yml
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}

  - key: test-run-dir
    use: rwx-cli
    run: |
      set -euo pipefail

      kickoff=$(rwx run .rwx/nested-ci.yml --wait --json -d "$RUN_DIR_PARENT")
      status=$(echo "$kickoff" | jq -r '.ResultStatus')
      run_url=$(echo "$kickoff" | jq -r '.RunURL // empty')
      echo "$run_url" > "$RWX_LINKS/Dir run"

      if [ "$status" != "succeeded" ]; then
        echo "Expected 'succeeded' with --dir, got '$status'"
        echo "$kickoff"
        exit 1
      fi
    env:
      RUN_DIR_PARENT: ${{ run.dir }}/integration/run-test/dir-test
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}

  - key: test-run-fail-fast
    use: rwx-cli
    run: |
      set -euo pipefail

      exit_code=0
      kickoff=$(rwx run "$RUN_DEF" --wait --fail-fast --json) || exit_code=$?
      run_url=$(echo "$kickoff" | jq -r '.RunURL // empty')
      echo "$run_url" > "$RWX_LINKS/Run URL"

      if [ "$exit_code" -eq 0 ]; then
        echo "Expected non-zero exit code with --fail-fast on failing run"
        echo "$kickoff"
        exit 1
      fi

      status=$(echo "$kickoff" | jq -r '.ResultStatus')
      if [ "$status" = "succeeded" ]; then
        echo "Expected non-succeeded status with --fail-fast on failing run, got '$status'"
        echo "$kickoff"
        exit 1
      fi

      prompt=$(echo "$kickoff" | jq -r '.ResultPrompt // empty')

      if ! echo "$prompt" | grep -q "will-fail-fast"; then
        echo "Expected prompt to include 'will-fail-fast', but it did not."
        echo "$kickoff"
        exit 1
      fi

      if echo "$prompt" | grep -q "will-fail-slow"; then
        echo "Expected prompt to NOT include 'will-fail-slow', but it did."
        echo "$kickoff"
        exit 1
      fi
    env:
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}
      RUN_DEF: ${{ run.dir }}/integration/run-test/failing-def.yml

  # `rwx runs start` is the noun-verb alias for `rwx run`; it must initiate a
  # run equivalently. The remaining `rwx run` behaviors share the same RunE, so
  # one equivalence check here is sufficient.
  - key: test-runs-start
    use: rwx-cli
    run: |
      set -euo pipefail

      kickoff=$(rwx runs start "$RUN_DEF" --wait --json --no-cache)
      status=$(echo "$kickoff" | jq -r '.ResultStatus')
      run_url=$(echo "$kickoff" | jq -r '.RunURL // empty')
      echo "$run_url" > "$RWX_LINKS/runs start run"

      if [ "$status" != "succeeded" ]; then
        echo "Expected 'succeeded' from 'rwx runs start', got '$status'"
        echo "$kickoff"
        exit 1
      fi

      if [ -z "$run_url" ]; then
        echo "Expected 'rwx runs start' to return a RunURL"
        echo "$kickoff"
        exit 1
      fi
    env:
      RUN_DEF: ${{ run.dir }}/integration/run-test/simple-def.yml
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}

  # Bare `rwx runs` is a pure parent command: it prints help and must never
  # initiate a run. No access token is required because help short-circuits
  # before any API client setup.
  - key: test-runs-bare-prints-help
    use: rwx-cli
    run: |
      set -euo pipefail

      output=$(rwx runs)

      if ! echo "$output" | grep -q "Available Commands"; then
        echo "Expected bare 'rwx runs' to print help with available commands"
        echo "$output"
        exit 1
      fi

      if ! echo "$output" | grep -q "start"; then
        echo "Expected bare 'rwx runs' help to list the 'start' subcommand"
        echo "$output"
        exit 1
      fi

      if echo "$output" | grep -qiE "https?://[^ ]+/runs/"; then
        echo "Bare 'rwx runs' should not initiate a run"
        echo "$output"
        exit 1
      fi

  # `rwx runs <id>` resolves to the parent group and prints help instead of
  # looking up a run; it is not a `rwx results` alias.
  - key: test-runs-bare-id-prints-help
    use: rwx-cli
    run: |
      set -euo pipefail

      output=$(rwx runs some-nonexistent-run-id)

      if ! echo "$output" | grep -q "Available Commands"; then
        echo "Expected 'rwx runs <id>' to print help"
        echo "$output"
        exit 1
      fi

      if echo "$output" | grep -qi "result status"; then
        echo "'rwx runs <id>' should not alias 'rwx results'"
        echo "$output"
        exit 1
      fi
