on:
  dispatch:
    - key: dispatch-success-test
      init:
        commit-sha: ${{ event.git.sha }}
      target: succeed
    - key: dispatch-failure-test
      init:
        commit-sha: ${{ event.git.sha }}
      target: [fail-fast, fail-slow]

base:
  image: ubuntu:24.04
  config: none

tasks:
  - key: succeed
    run: echo "succeeded"

  - key: fail-fast
    run: exit 1

  - key: fail-slow
    run: sleep 60 && exit 1