on:
  cli:
    init:
      ref: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.0

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/rwx-cloud/rwx.git
      ref: ${{ init.ref }}

  - key: build-def
    use: code
    run: cp .rwx/build.yml $RWX_ARTIFACTS/build-yml

  - key: build-rwx-cli
    call: ${{ tasks.build-def.artifacts.build-yml }}
    init:
      ref: ${{ init.ref }}

  - key: rwx-cli
    run: sudo install "$CLI_BINARY" /usr/local/bin
    env:
      CLI_BINARY: ${{ tasks.build-rwx-cli.tasks.build.artifacts.rwx }}

  - key: test-results
    use: rwx-cli
    run: |
      set -euo pipefail

      # Kick off a run without --wait
      kickoff=$(rwx run "$RUN_DEF" --json)
      run_id=$(echo "$kickoff" | jq -r '.RunID')
      run_url=$(echo "$kickoff" | jq -r '.RunURL // empty')
      echo "$run_url" > "$RWX_LINKS/Run URL"

      if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
        echo "Failed to get RunID from kickoff"
        echo "$kickoff"
        exit 1
      fi

      if [ -n "$run_url" ]; then
        echo "Run URL: $run_url"
      fi

      # Exercise rwx results --wait --json
      result=$(rwx results --wait --json "$run_id")
      status=$(echo "$result" | jq -r '.ResultStatus')
      completed=$(echo "$result" | jq -r '.Completed')
      result_run_id=$(echo "$result" | jq -r '.RunID')

      if [ "$status" != "succeeded" ]; then
        echo "Expected ResultStatus 'succeeded', got '$status'"
        echo "$result"
        exit 1
      fi

      if [ "$completed" != "true" ]; then
        echo "Expected Completed true, got '$completed'"
        echo "$result"
        exit 1
      fi

      if [ "$result_run_id" != "$run_id" ]; then
        echo "Expected RunID '$run_id', got '$result_run_id'"
        echo "$result"
        exit 1
      fi
    env:
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}
      RUN_DEF: ${{ run.dir }}/integration/results-test/passing.yml

  - key: test-results-fail-fast
    use: rwx-cli
    run: |
      set -euo pipefail

      # Kick off a failing run without --wait
      kickoff=$(rwx run "$RUN_DEF" --json)
      run_id=$(echo "$kickoff" | jq -r '.RunID')
      run_url=$(echo "$kickoff" | jq -r '.RunURL // empty')
      echo "$run_url" > "$RWX_LINKS/Run URL"

      if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
        echo "Failed to get RunID from kickoff"
        echo "$kickoff"
        exit 1
      fi

      # Exercise rwx results --wait --fail-fast --json
      exit_code=0
      result=$(rwx results --wait --fail-fast --json "$run_id") || exit_code=$?

      if [ "$exit_code" -eq 0 ]; then
        echo "Expected non-zero exit code with --fail-fast on failing run"
        echo "$result"
        exit 1
      fi

      status=$(echo "$result" | jq -r '.ResultStatus')
      if [ "$status" = "succeeded" ]; then
        echo "Expected non-succeeded status, got '$status'"
        echo "$result"
        exit 1
      fi

      prompt=$(echo "$result" | jq -r '.Prompt // empty')

      if ! echo "$prompt" | grep -q "will-fail-fast"; then
        echo "Expected prompt to include 'will-fail-fast', but it did not."
        echo "$result"
        exit 1
      fi

      if echo "$prompt" | grep -q "will-fail-slow"; then
        echo "Expected prompt to NOT include 'will-fail-slow', but it did."
        echo "$result"
        exit 1
      fi
    env:
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}
      RUN_DEF: ${{ run.dir }}/integration/results-test/failing.yml
