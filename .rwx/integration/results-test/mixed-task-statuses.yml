base:
  image: ubuntu:24.04
  config: rwx/base 1.0.0

tasks:
  - key: will-fail-fast
    run: exit 1

  - key: will-fail-slow
    run: sleep 10 && exit 1

  - key: will-pass
    run: echo "integration-test-content" > test-file.txt
    outputs:
      artifacts:
        - key: test-file
          path: test-file.txt